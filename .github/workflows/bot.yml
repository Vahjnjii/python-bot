name: Serverless Video Generator API

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Command or Text Script'
        required: true

# This queues jobs one by one automatically!
concurrency:
  group: video-queue
  cancel-in-progress: false 

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to upload to GitHub Releases
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # 🔥 THE MAGIC FIX: Instantly loads Whisper, Pip packages, and Datasets in 1 second!
    - name: Cache Environment & Datasets
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/pip
          ~/.cache/whisper
          ./input
        key: video-bot-cache-v1

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python Dependencies (Instant via Cache)
      run: pip install requests pydub openai-whisper kaggle google-genai soundfile numpy

    - name: Run Backend Script (bot.py)
      env:
        PROMPT: ${{ github.event.inputs.prompt }}
        GIST_ID: ${{ secrets.GIST_ID }}
        GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      run: python bot.py

    - name: 🚀 Upload Final Video to GitHub Releases
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Check if a final video was generated
        if ls ./working/final_*.mp4 1> /dev/null 2>&1; then
          TAG="video-$(date +%s)"
          # Uploads video to releases so your frontend can show it
          gh release create "$TAG" ./working/final_*.mp4 --title "Output: $TAG" --notes "Prompt used: ${{ github.event.inputs.prompt }}"
        else
          echo "No video generated (likely a settings/dataset update command)."
        fi
