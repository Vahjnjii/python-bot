name: Telegram Video Generator Bot

on: [push, workflow_dispatch]

# THIS IS THE FIX: It cancels any currently running bot when you push new code!
concurrency:
  group: telegram-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies (FFmpeg)
      run: |
        sudo apt-get update -y
        sudo apt-get install -y ffmpeg

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyTelegramBotAPI requests pydub openai-whisper kaggle google-genai soundfile numpy

    - name: Run Telegram Bot
      run: python bot.py
